<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>strobi Inc. | News</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .full-width-banner {
            width: 100vw;
            margin-left: calc(50% - 50vw);
            height: 250px;
            background-color: #a7d8de;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .full-width-banner h2 {
            color: #fff;
            font-size: 2rem;
            letter-spacing: 2px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
            margin: 0;
        }

        .filter-container {
            text-align: center;
            margin-bottom: 3rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: #fff;
            border: 2px solid #0277bd;
            color: #0277bd;
            padding: 0.6rem 2rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background-color: #e1f5fe;
        }

        .filter-btn.active {
            background-color: #0277bd;
            color: #fff;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            max-width: 1100px;
            margin: 0 auto 5rem auto;
        }

        .news-card {
            display: block;
            text-decoration: none;
            color: inherit;
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #eee;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .news-img-wrapper {
            width: 100%;
            height: 200px;
            overflow: hidden;
        }

        .news-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .news-img-placeholder {
            width: 100%;
            height: 200px;
            background-color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
        }

        .news-content {
            padding: 1.5rem;
        }

        .news-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }

        .news-date {
            color: #666;
        }

        .news-tag {
            padding: 0.2rem 0.8rem;
            border-radius: 4px;
            font-weight: bold;
        }

        .tag-notice {
            background-color: #e1f5fe;
            color: #0277bd;
        }

        .tag-press {
            background-color: #fff3e0;
            color: #e65100;
        }

        .news-title {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #1a365d;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">strobi Inc.</div>
        <nav>
            <ul>
                <li><a href="toppage.html">Home</a></li>
                <li><a href="service.html">Service</a></li>
                <li><a href="about.html">About us</a></li>
                <li><a href="jellyfish.html">About Jellyfish</a></li>
                <li><a href="photography.html">Photography</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="news-overview">
            <div class="full-width-banner">
                <h2>News</h2>
            </div>
        </section>

        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">すべて</button>
            <button class="filter-btn" data-filter="notice">お知らせ</button>
            <button class="filter-btn" data-filter="press">プレスリリース</button>
        </div>

        <div class="news-grid" id="news-grid">
            <!-- JavaScriptが自動で入れる -->
        </div>

    </main>

    <footer>
        <nav>
            <ul class="footer-links">
                <li><a href="toppage.html">Home</a></li>
                <li><a href="service.html">Service</a></li>
                <li><a href="about.html">About us</a></li>
                <li><a href="jellyfish.html">About Jellyfish</a></li>
                <li><a href="photography.html">Photography</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <p class="copyright">&copy; strobi Inc.</p>
    </footer>

    <script src="news-data.js"></script>
    <script>
        // カードを自動生成
        const grid = document.getElementById('news-grid');
        newsData.forEach(item => {
            const imageHtml = item.image
                ? `<div class="news-img-wrapper"><img src="${item.image}" alt="${item.title}"></div>`
                : `<div class="news-img-placeholder">[画像]</div>`;

            grid.innerHTML += `
                <a href="${item.url}" class="news-card" data-category="${item.category}">
                    ${imageHtml}
                    <div class="news-content">
                        <div class="news-meta">
                            <span class="news-date">${item.date}</span>
                            <span class="news-tag tag-${item.category}">${item.tag}</span>
                        </div>
                        <h3 class="news-title">${item.title}</h3>
                    </div>
                </a>
            `;
        });

        // フィルターボタン
        document.addEventListener('DOMContentLoaded', function() {
            const buttons = document.querySelectorAll('.filter-btn');

            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    buttons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');

                    const filterValue = button.getAttribute('data-filter');
                    const cards = document.querySelectorAll('.news-card');

                    cards.forEach(card => {
                        if (filterValue === 'all' || card.getAttribute('data-category') === filterValue) {
                            card.style.display = 'block';
                        } else {
                            card.style.display = 'none';
                        }
                    });
                });
            });
        });
    </script>
</body>
</html>
